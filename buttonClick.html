<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Button Click Events</title>
    <link rel="stylesheet" href="buttonClick.css">
</head>
<body>
    <div class="container">
        <h1>Button Click Events</h1>
        <p id="message">Click a button</p>
        <button id="clickBtn">Change Text</button>
        <button id="toggleBtn">Toggle Message</button>
        <button id="selfBtn">Click Me</button>
        <p id="countDisplay">Clicked 0 times</p>
        <button id="countBtn">Count Clicks</button>
    </div>
    <script src="buttonClick.js"></script>
</body>
</html>
