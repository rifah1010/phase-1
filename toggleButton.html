<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toggle Button</title>
    <link rel="stylesheet" href="toggleButton.css">
</head>
<body>
    <div class="container">
        <h1>Toggle Button</h1>
        <button id="showBtn">Show Content</button>
        <div id="content">This is hidden content!</div>
        <br><br>
        <button id="themeBtn">Dark Mode</button>
        <br><br>
        <input type="text" id="toggleInput" value="Editable text">
        <button id="disableBtn">Disable Input</button>
    </div>
    <script src="toggleButton.js"></script>
</body>
</html>
