<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">BikeZone</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="menu-toggle">&#9776;</div>
  </nav>

  <!-- Product Showcase -->
  <section class="flex-container">
  <div class="product">
    <img src="splendor.jpeg" alt="Splendor">
    <h3>Modified Splendor</h3>
    <p class="price">
      <span class="original">₹55,999</span>
    </p>
  </div>

  <div class="product">
    <img src="bullet.jpeg" alt="Bullet">
    <h3>Road Bike</h3>
    <p class="price">
      <span class="original">₹78,999</span>
    </p>
  </div>

  <div class="product">
    <img src="ktm.jpeg" alt="ktm">
    <h3>Ktm Bike</h3>
    <p class="price">
      <span class="original">₹62,999</span>
    </p>
  </div>

  <div class="product">
    <img src="ninja.jpeg" alt="Ninja Bike">
    <h3>Kawasaki Ninja Bike</h3>
    <p class="price">
      <span class="original">₹125,999</span>
    </p>
  </div>

  <div class="product">
    <img src="GT650.jpeg" alt=" GT650">
    <h3>GT650</h3>
    <p class="price">
      <span class="original">₹109,999</span>
    </p>
  </div>

  <div class="product">
    <img src="interceptor.jpeg" alt="Interceptor">
    <h3>Interceptor</h3>
    <p class="price">
      <span class="original">₹99,999</span>
    </p>
  </div>
</section>


  <footer>© 2026 BikeZone</footer>
  <script src="script.js"></script>
</body>
</html>
